<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higgsfield Film Engine v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=DM+Sans:wght@300;400;700&family=Playfair+Display:ital,wght@1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8a2e;
            --black: #0a0a0a;
            --dark-grey: #1a1a1a;
            --light-grey: #f5f5f5;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--black);
            color: var(--light-grey);
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid var(--dark-grey);
        }

        .brand-meta {
            font-size: 10px;
            letter-spacing: 4px;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-weight: 700;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--gold);
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: var(--dark-gold);
            letter-spacing: 1px;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        .form-container {
            background-color: #0f0f0f;
            border: 1px solid var(--dark-grey);
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #777;
            margin-bottom: 10px;
            font-weight: 700;
        }

        input, select, textarea {
            background-color: transparent;
            border: none;
            border-bottom: 1px solid #333;
            color: var(--white);
            padding: 10px 0;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-bottom-color: var(--gold);
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        select {
            cursor: pointer;
        }

        .btn-container {
            margin-top: 50px;
            text-align: center;
        }

        button {
            background-color: var(--gold);
            color: var(--black);
            border: none;
            padding: 18px 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        button:hover {
            background-color: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .output-card {
            margin-top: 60px;
            background-color: #151515;
            border: 1px solid var(--dark-grey);
            padding: 40px;
            display: none;
            border-left: 4px solid var(--gold);
        }

        .output-card.active {
            display: block;
        }

        .output-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        #promptOutput {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ccc;
            white-space: pre-wrap;
        }

        footer {
            padding: 60px 20px;
            text-align: center;
            border-top: 1px solid var(--dark-grey);
            font-size: 10px;
            letter-spacing: 2px;
            color: #444;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand-meta">{N8} MEDIA × BUILT FOR HIGGSFIELD AI</div>
        <h1>HIGGSFIELD FILM ENGINE</h1>
        <div class="subtitle">Precision AI Cinematography Suite</div>
    </header>

    <main>
        <div class="form-container">
            <div class="form-grid">
                <div class="input-group">
                    <label>Scene No.</label>
                    <input type="text" id="sceneNo" placeholder="SC-01">
                </div>
                <div class="input-group">
                    <label>Visual Style</label>
                    <select id="visualStyle">
                        <option value="Hyper-Realistic Cinema">Hyper-Realistic Cinema</option>
                        <option value="Neo-Noir Noir">Neo-Noir Noir</option>
                        <option value="Kodak 35mm Film">Kodak 35mm Film</option>
                        <option value="Anamorphic Sci-Fi">Anamorphic Sci-Fi</option>
                        <option value="Vintage Documentary">Vintage Documentary</option>
                    </select>
                </div>
                <div class="input-group full-width">
                    <label>Scene Action</label>
                    <textarea id="action" placeholder="Describe the character action and camera movement..."></textarea>
                </div>
                <div class="input-group">
                    <label>Lighting Mood</label>
                    <select id="mood">
                        <option value="Chiaroscuro">Chiaroscuro</option>
                        <option value="Golden Hour">Golden Hour</option>
                        <option value="Harsh Moonlight">Harsh Moonlight</option>
                        <option value="Soft Volumetric">Soft Volumetric</option>
                        <option value="Cold Clinical">Cold Clinical</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Duration</label>
                    <select id="duration">
                        <option value="5 Seconds">5 Seconds</option>
                        <option value="10 Seconds">10 Seconds</option>
                        <option value="15 Seconds">15 Seconds</option>
                    </select>
                </div>
            </div>
            <div class="btn-container">
                <button onclick="generatePrompt()">Generate Prompt</button>
            </div>
        </div>

        <div class="output-card" id="outputCard">
            <div class="output-header">Generated Manuscript</div>
            <div id="promptOutput"></div>
        </div>
    </main>

    <footer>
        &copy; 2026 {N8} MEDIA PRODUCTION TOOLS | POWERED BY HIGGSFIELD AI
    </footer>

    <script>
        function generatePrompt() {
            const scene = document.getElementById('sceneNo').value || 'SC-01';
            const style = document.getElementById('visualStyle').value;
            const action = document.getElementById('action').value || 'A solitary figure walks through a rain-slicked alleyway.';
            const mood = document.getElementById('mood').value;
            const duration = document.getElementById('duration').value;

            const prompt = `[PROMPT MANUSCRIPT]

SCENE: ${scene}
STYLE: ${style}
LIGHTING: ${mood}
DURATION: ${duration}

[MASTER PROMPT]
${style} cinematography of ${action}. ${mood} lighting. Professional cinematic color grade. Ultra-detailed 8k texture. High dynamic range. Shot for Higgsfield AI film production.`;

            document.getElementById('promptOutput').innerText = prompt;
            document.getElementById('outputCard').classList.add('active');
            
            // Scroll to output
            document.getElementById('outputCard').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
